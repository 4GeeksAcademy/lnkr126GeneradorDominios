<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Nombres de Dominio</title>
       <!-- Tailwind CSS  -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-xl text-center">
        <h1 class="text-4xl font-black text-indigo-600 mb-2">Domain Generator</h1>
        <p class="text-gray-500 mb-8">Haz clic en el botón para mezclar las listas y crear dominios únicos.</p>
        
        <button id="btn-generar" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full transition-all transform hover:scale-105 active:scale-95 shadow-lg mb-8">
            Generar Dominios
        </button>
        <p class="text-gray-500 mb-6"> by LNKR</p>
        <div class="text-left">
            <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-widest mb-3">Resultados:</h3>
            <div id="domain-results" class="grid grid-cols-1 gap-2 font-mono text-sm bg-slate-50 p-4 rounded-xl border border-slate-200 max-h-80 overflow-y-auto">
                <span class="text-gray-400 italic">La lista aparecerá aquí...</span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
